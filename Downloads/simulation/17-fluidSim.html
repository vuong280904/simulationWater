Based on original work by Matthias Müller - Ten Minute Physics (MIT License)
Modified: Flow-only simulation (Wind Tunnel / Vortex Shedding)
-->
<!DOCTYPE html>
<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
  <title>Fluid Flow Simulation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0f;
      color: #c8d8e8;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: #10131a;
      border-bottom: 1px solid #1e2a3a;
      flex-wrap: wrap;
    }
    .title {
      font-size: 13px;
      font-weight: bold;
      color: #4af;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-right: 8px;
    }
    .sep { width: 1px; height: 24px; background: #1e2a3a; }
    .label { font-size: 11px; color: #678; letter-spacing: 1px; }
    .toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
      color: #89a;
      user-select: none;
    }
    .toggle input[type=checkbox] {
      accent-color: #4af;
      width: 14px; height: 14px;
      cursor: pointer;
    }
    .toggle:hover { color: #4af; }
    #resBtn {
      background: #1a2a3a;
      border: 1px solid #2a4a6a;
      color: #4af;
      padding: 4px 14px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 2px;
    }
    #resBtn:hover { background: #1e3a5a; }
    #resBtn.hires { background: #0a2a1a; border-color: #2a8a4a; color: #4fa; }
    #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    #myCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #info {
      position: absolute;
      bottom: 10px; left: 14px;
      font-size: 11px;
      color: #456;
      pointer-events: none;
    }
    #pressureLabel {
      position: absolute;
      top: 10px; left: 14px;
      font-size: 12px;
      color: #aac;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <span class="title">Mô phỏng dòng chảy</span>
  <div class="sep"></div>
  <label class="toggle" title="Vẽ các đường theo chiều chuyển động của dòng chảy"><input type="checkbox" id="streamBtn"> Đường dòng chảy</label>
  <label class="toggle" title="Tô màu theo áp suất: xanh = thấp, đỏ = cao"><input type="checkbox" id="pressBtn"> Áp suất</label>
  <label class="toggle" title="Phun thuốc màu để thấy dòng chảy di chuyển như thế nào"><input type="checkbox" id="smokeBtn" checked> Thuốc màu</label>
  <div class="sep"></div>
  <button id="resBtn" onclick="toggleRes()">⬆ Chất lượng cao</button>
</div>

<div id="canvas-wrap">
  <canvas id="myCanvas"></canvas>
  <div id="pressureLabel"></div>
  <div id="info">Kéo chuột để di chuyển vật cản &nbsp;|&nbsp; Nhấn P để tạm dừng</div>
</div>

<script>
  var canvas = document.getElementById("myCanvas");
  var c = canvas.getContext("2d");

  var wrap = document.getElementById("canvas-wrap");
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;

  var simHeight = 1.1;
  var cScale    = canvas.height / simHeight;
  var simWidth  = canvas.width / cScale;

  var U_FIELD = 0, V_FIELD = 1, S_FIELD = 2;
  var cnt = 0;
  var hiRes = false;

  function cX(x) { return x * cScale; }
  function cY(y) { return canvas.height - y * cScale; }

  // ── Fluid Solver ──────────────────────────────────────────────────────────
  class Fluid {
    constructor(density, numX, numY, h) {
      this.density  = density;
      this.numX     = numX + 2;
      this.numY     = numY + 2;
      this.numCells = this.numX * this.numY;
      this.h        = h;
      this.u    = new Float32Array(this.numCells);
      this.v    = new Float32Array(this.numCells);
      this.newU = new Float32Array(this.numCells);
      this.newV = new Float32Array(this.numCells);
      this.p    = new Float32Array(this.numCells);
      this.s    = new Float32Array(this.numCells);
      this.m    = new Float32Array(this.numCells);
      this.newM = new Float32Array(this.numCells);
      this.m.fill(1.0);
    }

    integrate(dt, gravity) {
      var n = this.numY;
      for (var i = 1; i < this.numX; i++)
        for (var j = 1; j < this.numY - 1; j++)
          if (this.s[i*n+j] !== 0 && this.s[i*n+j-1] !== 0)
            this.v[i*n+j] += gravity * dt;
    }

    solveIncompressibility(numIters, dt) {
      var n  = this.numY;
      var cp = this.density * this.h / dt;
      for (var iter = 0; iter < numIters; iter++) {
        for (var i = 1; i < this.numX - 1; i++) {
          for (var j = 1; j < this.numY - 1; j++) {
            if (this.s[i*n+j] === 0) continue;
            var sx0 = this.s[(i-1)*n+j], sx1 = this.s[(i+1)*n+j];
            var sy0 = this.s[i*n+j-1],   sy1 = this.s[i*n+j+1];
            var s   = sx0 + sx1 + sy0 + sy1;
            if (s === 0) continue;
            var div = this.u[(i+1)*n+j] - this.u[i*n+j] + this.v[i*n+j+1] - this.v[i*n+j];
            var p   = -div / s * scene.overRelaxation;
            this.p[i*n+j] += cp * p;
            this.u[i*n+j]     -= sx0 * p;
            this.u[(i+1)*n+j] += sx1 * p;
            this.v[i*n+j]     -= sy0 * p;
            this.v[i*n+j+1]   += sy1 * p;
          }
        }
      }
    }

    extrapolate() {
      var n = this.numY;
      for (var i = 0; i < this.numX; i++) {
        this.u[i*n+0]           = this.u[i*n+1];
        this.u[i*n+this.numY-1] = this.u[i*n+this.numY-2];
      }
      for (var j = 0; j < this.numY; j++) {
        this.v[0*n+j]               = this.v[1*n+j];
        this.v[(this.numX-1)*n + j] = this.v[(this.numX-2)*n+j];
      }
    }

    sampleField(x, y, field) {
      var n  = this.numY, h = this.h, h1 = 1/h, h2 = 0.5*h;
      x = Math.max(Math.min(x, this.numX*h), h);
      y = Math.max(Math.min(y, this.numY*h), h);
      var dx = 0, dy = 0, f;
      switch (field) {
        case U_FIELD: f = this.u; dy = h2; break;
        case V_FIELD: f = this.v; dx = h2; break;
        case S_FIELD: f = this.m; dx = h2; dy = h2; break;
      }
      var x0 = Math.min(Math.floor((x-dx)*h1), this.numX-1);
      var tx = ((x-dx) - x0*h) * h1;
      var x1 = Math.min(x0+1, this.numX-1);
      var y0 = Math.min(Math.floor((y-dy)*h1), this.numY-1);
      var ty = ((y-dy) - y0*h) * h1;
      var y1 = Math.min(y0+1, this.numY-1);
      var sx = 1-tx, sy = 1-ty;
      return sx*sy*f[x0*n+y0] + tx*sy*f[x1*n+y0] + tx*ty*f[x1*n+y1] + sx*ty*f[x0*n+y1];
    }

    avgU(i, j) {
      var n = this.numY;
      return (this.u[i*n+j-1] + this.u[i*n+j] + this.u[(i+1)*n+j-1] + this.u[(i+1)*n+j]) * 0.25;
    }
    avgV(i, j) {
      var n = this.numY;
      return (this.v[(i-1)*n+j] + this.v[i*n+j] + this.v[(i-1)*n+j+1] + this.v[i*n+j+1]) * 0.25;
    }

    advectVel(dt) {
      this.newU.set(this.u); this.newV.set(this.v);
      var n = this.numY, h = this.h, h2 = 0.5*h;
      for (var i = 1; i < this.numX; i++) {
        for (var j = 1; j < this.numY; j++) {
          cnt++;
          if (this.s[i*n+j] !== 0 && this.s[(i-1)*n+j] !== 0 && j < this.numY-1) {
            var x = i*h, y = j*h+h2;
            var u = this.u[i*n+j], v = this.avgV(i,j);
            x -= dt*u; y -= dt*v;
            this.newU[i*n+j] = this.sampleField(x, y, U_FIELD);
          }
          if (this.s[i*n+j] !== 0 && this.s[i*n+j-1] !== 0 && i < this.numX-1) {
            var x = i*h+h2, y = j*h;
            var u = this.avgU(i,j), v = this.v[i*n+j];
            x -= dt*u; y -= dt*v;
            this.newV[i*n+j] = this.sampleField(x, y, V_FIELD);
          }
        }
      }
      this.u.set(this.newU); this.v.set(this.newV);
    }

    advectSmoke(dt) {
      this.newM.set(this.m);
      var n = this.numY, h = this.h, h2 = 0.5*h;
      for (var i = 1; i < this.numX-1; i++) {
        for (var j = 1; j < this.numY-1; j++) {
          if (this.s[i*n+j] !== 0) {
            var u = (this.u[i*n+j] + this.u[(i+1)*n+j]) * 0.5;
            var v = (this.v[i*n+j] + this.v[i*n+j+1]) * 0.5;
            this.newM[i*n+j] = this.sampleField(i*h+h2 - dt*u, j*h+h2 - dt*v, S_FIELD);
          }
        }
      }
      this.m.set(this.newM);
    }

    simulate(dt, gravity, numIters) {
      this.integrate(dt, gravity);
      this.p.fill(0);
      this.solveIncompressibility(numIters, dt);
      this.extrapolate();
      this.advectVel(dt);
      this.advectSmoke(dt);
    }
  }

  // ── Scene ─────────────────────────────────────────────────────────────────
  var scene = {
    gravity: 0.0,
    dt: 1.0 / 60.0,
    numIters: 40,
    frameNr: 0,
    overRelaxation: 1.9,
    obstacleX: 0, obstacleY: 0,
    obstacleRadius: 0.15,
    paused: false,
    showObstacle: false,
    showStreamlines: false,
    showVelocities: false,
    showPressure: false,
    showSmoke: true,
    fluid: null
  };

  function setupScene() {
    scene.overRelaxation = 1.9;
    scene.dt       = hiRes ? 1.0/120.0 : 1.0/60.0;
    scene.numIters = hiRes ? 100 : 40;

    var res = hiRes ? 200 : 100;
    var domainHeight = 1.0;
    var domainWidth  = domainHeight / simHeight * simWidth;
    var h    = domainHeight / res;
    var numX = Math.floor(domainWidth / h);
    var numY = Math.floor(domainHeight / h);

    var f = scene.fluid = new Fluid(1000, numX, numY, h);
    var n = f.numY;
    var inVel = 2.0;

    for (var i = 0; i < f.numX; i++) {
      for (var j = 0; j < f.numY; j++) {
        // solid walls: left col, top & bottom rows
        var s = (i === 0 || j === 0 || j === f.numY-1) ? 0.0 : 1.0;
        f.s[i*n+j] = s;
        if (i === 1) f.u[i*n+j] = inVel;  // inlet velocity
      }
    }

    // dye stripe at inlet
    var pipeH = 0.1 * f.numY;
    var minJ  = Math.floor(0.5 * f.numY - 0.5*pipeH);
    var maxJ  = Math.floor(0.5 * f.numY + 0.5*pipeH);
    for (var j = minJ; j < maxJ; j++) f.m[j] = 0.0;

    setObstacle(0.4, 0.5, true);

    // default view: streamlines ON, smoke ON
    scene.showStreamlines = true;
    scene.showSmoke       = true;
    scene.showPressure    = hiRes;
    scene.showVelocities  = false;

    document.getElementById("streamBtn").checked = scene.showStreamlines;
    document.getElementById("pressBtn").checked  = scene.showPressure;
    document.getElementById("smokeBtn").checked  = scene.showSmoke;
  }

  // ── Controls ──────────────────────────────────────────────────────────────
  document.getElementById("streamBtn").addEventListener("change", e => scene.showStreamlines = e.target.checked);
  document.getElementById("pressBtn").addEventListener("change", e => scene.showPressure    = e.target.checked);
  document.getElementById("smokeBtn").addEventListener("change", e => scene.showSmoke       = e.target.checked);

  function toggleRes() {
    hiRes = !hiRes;
    var btn = document.getElementById("resBtn");
    btn.textContent = hiRes ? "⬇ Chất lượng thường" : "⬆ Chất lượng cao";
    btn.className   = hiRes ? "hires" : "";
    setupScene();
  }

  // ── Color helpers ─────────────────────────────────────────────────────────
  function getSciColor(val, minVal, maxVal) {
    val = Math.min(Math.max(val, minVal), maxVal - 0.0001);
    var d = maxVal - minVal;
    val = d === 0 ? 0.5 : (val - minVal) / d;
    var m = 0.25, num = Math.floor(val/m), s = (val - num*m)/m;
    var r, g, b;
    switch(num) {
      case 0: r=0;   g=s;   b=1;   break;
      case 1: r=0;   g=1;   b=1-s; break;
      case 2: r=s;   g=1;   b=0;   break;
      case 3: r=1;   g=1-s; b=0;   break;
    }
    return [255*r, 255*g, 255*b, 255];
  }

  // ── Draw ──────────────────────────────────────────────────────────────────
  function draw() {
    c.clearRect(0, 0, canvas.width, canvas.height);
    var f = scene.fluid, n = f.numY, h = f.h;

    var minP = f.p[0], maxP = f.p[0];
    for (var i = 0; i < f.numCells; i++) {
      minP = Math.min(minP, f.p[i]);
      maxP = Math.max(maxP, f.p[i]);
    }

    var id    = c.getImageData(0, 0, canvas.width, canvas.height);
    var color = [255,255,255,255];

    for (var i = 0; i < f.numX; i++) {
      for (var j = 0; j < f.numY; j++) {
        if (scene.showPressure) {
          color = getSciColor(f.p[i*n+j], minP, maxP);
          if (scene.showSmoke) {
            var s = f.m[i*n+j];
            color[0] = Math.max(0, color[0] - 255*s);
            color[1] = Math.max(0, color[1] - 255*s);
            color[2] = Math.max(0, color[2] - 255*s);
          }
        } else if (scene.showSmoke) {
          var s = f.m[i*n+j];
          color[0] = 255*s; color[1] = 255*s; color[2] = 255*s;
        } else if (f.s[i*n+j] === 0) {
          color[0] = 0; color[1] = 0; color[2] = 0;
        } else {
          // velocity magnitude → blue-cyan gradient
          var u = f.u[i*n+j], v = f.v[i*n+j];
          var spd = Math.sqrt(u*u+v*v);
          var t = Math.min(spd / 3.0, 1.0);
          color[0] = Math.floor(20  + t*40);
          color[1] = Math.floor(60  + t*160);
          color[2] = Math.floor(120 + t*100);
        }

        var x  = Math.floor(cX(i*h));
        var y  = Math.floor(cY((j+1)*h));
        var cs = Math.floor(cScale * 1.1 * h) + 1;
        var r = color[0], g = color[1], b = color[2];

        for (var yi = y; yi < y+cs; yi++) {
          var p = 4*(yi*canvas.width + x);
          for (var xi = 0; xi < cs; xi++) {
            id.data[p++]=r; id.data[p++]=g; id.data[p++]=b; id.data[p++]=255;
          }
        }
      }
    }
    c.putImageData(id, 0, 0);

    // Velocity arrows
    if (scene.showVelocities) {
      c.strokeStyle = "#00ffaa44";
      c.lineWidth = 1;
      var scale = 0.02;
      for (var i = 0; i < f.numX; i++) {
        for (var j = 0; j < f.numY; j++) {
          var u = f.u[i*n+j], v = f.v[i*n+j];
          c.beginPath();
          c.moveTo(cX(i*h),              cY((j+0.5)*h));
          c.lineTo(cX(i*h + u*scale),    cY((j+0.5)*h));
          c.stroke();
          c.beginPath();
          c.moveTo(cX((i+0.5)*h), cY(j*h));
          c.lineTo(cX((i+0.5)*h), cY(j*h + v*scale));
          c.stroke();
        }
      }
    }

    // Streamlines
    if (scene.showStreamlines) {
      var segLen = f.h * 0.2;
      var numSegs = 20;
      c.lineWidth = 1;

      for (var i = 1; i < f.numX-1; i += 5) {
        for (var j = 1; j < f.numY-1; j += 5) {
          var x = (i+0.5)*f.h, y = (j+0.5)*f.h;

          // Color streamlines by starting y-position (rainbow)
          var hue = Math.floor(280 * j / f.numY);
          c.strokeStyle = `hsla(${hue}, 90%, 65%, 0.7)`;
          c.beginPath();
          c.moveTo(cX(x), cY(y));

          for (var k = 0; k < numSegs; k++) {
            var u = f.sampleField(x, y, U_FIELD);
            var v = f.sampleField(x, y, V_FIELD);
            x += u * 0.01;
            y += v * 0.01;
            if (x > f.numX * f.h) break;
            c.lineTo(cX(x), cY(y));
          }
          c.stroke();
        }
      }
    }

    // Obstacle circle
    if (scene.showObstacle) {
      var r = scene.obstacleRadius + f.h;
      c.fillStyle   = scene.showPressure ? "#111" : "#334455";
      c.strokeStyle = "#4af";
      c.lineWidth   = 2;
      c.beginPath();
      c.arc(cX(scene.obstacleX), cY(scene.obstacleY), cScale*r, 0, 2*Math.PI);
      c.closePath();
      c.fill();
      c.stroke();
      c.lineWidth = 1;
    }

    // Pressure legend
    var lbl = document.getElementById("pressureLabel");
    if (scene.showPressure) {
      lbl.style.display = "block";
      lbl.textContent = `Áp suất: ${minP.toFixed(0)} – ${maxP.toFixed(0)} N/m`;
    } else {
      lbl.style.display = "none";
    }
  }

  // ── Obstacle ──────────────────────────────────────────────────────────────
  function setObstacle(x, y, reset) {
    var vx = 0, vy = 0;
    if (!reset) { vx = (x-scene.obstacleX)/scene.dt; vy = (y-scene.obstacleY)/scene.dt; }
    scene.obstacleX = x; scene.obstacleY = y;
    var r = scene.obstacleRadius, f = scene.fluid, n = f.numY;

    for (var i = 1; i < f.numX-2; i++) {
      for (var j = 1; j < f.numY-2; j++) {
        f.s[i*n+j] = 1.0;
        var dx = (i+0.5)*f.h - x, dy = (j+0.5)*f.h - y;
        if (dx*dx + dy*dy < r*r) {
          f.s[i*n+j] = 0.0;
          f.m[i*n+j] = 1.0;
          f.u[i*n+j] = vx; f.u[(i+1)*n+j] = vx;
          f.v[i*n+j] = vy; f.v[i*n+j+1]   = vy;
        }
      }
    }
    scene.showObstacle = true;
  }

  // ── Mouse / Touch ─────────────────────────────────────────────────────────
  var mouseDown = false;

  function toSim(cx, cy) {
    var b  = canvas.getBoundingClientRect();
    var mx = (cx - b.left) * (canvas.width  / b.width);
    var my = (cy - b.top)  * (canvas.height / b.height);
    return { x: mx/cScale, y: (canvas.height-my)/cScale };
  }

  canvas.addEventListener("mousedown",  e => { mouseDown=true;  var p=toSim(e.clientX,e.clientY); setObstacle(p.x,p.y,true); });
  canvas.addEventListener("mouseup",    () => mouseDown=false);
  canvas.addEventListener("mousemove",  e => { if(mouseDown){ var p=toSim(e.clientX,e.clientY); setObstacle(p.x,p.y,false); }});
  canvas.addEventListener("touchstart", e => { var t=e.touches[0]; mouseDown=true; var p=toSim(t.clientX,t.clientY); setObstacle(p.x,p.y,true); });
  canvas.addEventListener("touchend",   () => mouseDown=false);
  canvas.addEventListener("touchmove",  e => { e.preventDefault(); var t=e.touches[0]; var p=toSim(t.clientX,t.clientY); setObstacle(p.x,p.y,false); }, {passive:false});

  document.addEventListener("keydown", e => {
    if (e.key === "p" || e.key === "P") scene.paused = !scene.paused;
    if (e.key === "m" || e.key === "M") { scene.paused=false; simulate(); scene.paused=true; }
  });

  // ── Main loop ─────────────────────────────────────────────────────────────
  function simulate() {
    if (!scene.paused)
      scene.fluid.simulate(scene.dt, scene.gravity, scene.numIters);
    scene.frameNr++;
  }

  function update() {
    simulate();
    draw();
    requestAnimationFrame(update);
  }

  setupScene();
  update();
</script>
</body>
</html>
